<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品管理 · 李琪 LIQI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23e8b86d'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='55' font-weight='900' fill='%230a0a0b' font-family='Inter'%3EL%3C/text%3E%3C/svg%3E">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #070708;
      --bg-elevated: #0f0d0a;
      --surface: rgba(20, 18, 14, 0.72);
      --surface-hover: rgba(30, 26, 18, 0.85);
      --border: rgba(232,184,109,0.08);
      --border-hover: rgba(232,184,109,0.18);
      --text: #f2f2f5;
      --text-secondary: #b8b0a0;
      --text-muted: #7a7268;
      --accent: #e8b86d;
      --accent-dim: rgba(232,184,109,0.12);
      --transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;
    }
    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 15px; line-height: 1.7;
      overflow-x: hidden; -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--accent-dim); color: var(--accent); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface-hover); border-radius: 3px; }

    /* Noise */
    .noise-overlay {
      position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 128px 128px;
    }

    /* Login overlay */
    .login-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .login-overlay.hidden { display: none; }
    .login-card {
      background: rgba(19,19,22,0.8);
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px; padding: 48px 56px;
      text-align: center; max-width: 420px; width: 100%;
      box-shadow: 0 40px 100px rgba(0,0,0,0.45);
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232,184,109,0.3), transparent);
    }
    .login-card h2 {
      font-size: 24px; font-weight: 700; margin-bottom: 8px;
      letter-spacing: -0.01em;
    }
    .login-card .login-sub {
      font-size: 13px; color: var(--text-muted); margin-bottom: 32px;
    }
    .login-card input {
      width: 100%; background: rgba(25,22,16,0.8);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; color: var(--text); font-size: 14px;
      font-family: inherit; outline: none; transition: var(--transition);
      margin-bottom: 16px;
    }
    .login-card input::placeholder { color: var(--text-muted); }
    .login-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .login-btn {
      width: 100%; background: var(--accent); color: #0a0a0b;
      border: none; border-radius: 10px; padding: 14px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: var(--transition);
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(232,184,109,0.25); }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 48px; height: 68px;
      background: rgba(7,7,8,0.85);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 16px; font-weight: 700; letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 20px; list-style: none; }
    .nav-links a {
      color: var(--text-secondary); text-decoration: none; font-size: 13px;
      font-weight: 500; transition: var(--transition); padding: 4px 0;
    }
    .nav-links a:hover { color: var(--accent); }

    /* Main */
    main {
      padding: 100px 48px 60px; max-width: 1100px; margin: 0 auto;
    }
    .page-title {
      font-size: 32px; font-weight: 800; margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .page-title .accent { color: var(--accent); }
    .page-subtitle {
      font-size: 14px; color: var(--text-muted); margin-bottom: 48px;
    }

    /* Upload section */
    .upload-section {
      background: linear-gradient(135deg, rgba(25,22,16,0.9), rgba(18,16,12,0.85));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 36px;
      margin-bottom: 48px;
      backdrop-filter: blur(12px);
    }
    .upload-section h3 {
      font-size: 18px; font-weight: 600; margin-bottom: 24px;
      display: flex; align-items: center; gap: 10px;
    }
    .upload-section h3::before {
      content: ''; display: block; width: 4px; height: 20px;
      background: var(--accent); border-radius: 2px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .form-input {
      width: 100%; background: rgba(25,22,16,0.8);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; color: var(--text); font-size: 14px;
      font-family: inherit; outline: none; transition: var(--transition);
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    select.form-input { appearance: none; cursor: pointer; }
    textarea.form-input { resize: vertical; min-height: 80px; }
    .form-check {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-secondary); cursor: pointer;
    }
    .form-check input { accent-color: var(--accent); width: 16px; height: 16px; }

    .upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius-md);
      padding: 40px 24px; text-align: center; cursor: pointer;
      transition: var(--transition); background: rgba(255,255,255,0.01);
      margin-top: 20px;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent); background: var(--accent-dim);
    }
    .upload-area-icon {
      width: 56px; height: 56px; border-radius: var(--radius-md);
      background: var(--surface); display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin: 0 auto 16px; border: 1px solid var(--border);
    }
    .upload-area h4 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .upload-area p { font-size: 13px; color: var(--text-muted); }
    .upload-area input { display: none; }
    .upload-progress {
      margin-top: 16px; height: 4px; background: var(--bg-elevated);
      border-radius: 100px; overflow: hidden; display: none;
    }
    .upload-progress.active { display: block; }
    .upload-progress-bar {
      height: 100%; background: linear-gradient(90deg, var(--accent), #c49a4e);
      border-radius: 100px; transition: width 0.3s ease; width: 0%;
    }

    /* Works management */
    .works-section h3 {
      font-size: 18px; font-weight: 600; margin-bottom: 24px;
      display: flex; align-items: center; gap: 10px;
    }
    .works-section h3::before {
      content: ''; display: block; width: 4px; height: 20px;
      background: var(--accent); border-radius: 2px;
    }
    .works-section .count {
      font-size: 13px; color: var(--text-muted); font-weight: 400;
    }
    .admin-works-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .admin-card {
      background: linear-gradient(135deg, rgba(25,22,16,0.92), rgba(18,16,12,0.88));
      border: 1px solid var(--border);
      border-radius: var(--radius-md); overflow: hidden;
      transition: var(--transition); position: relative;
    }
    .admin-card:hover { border-color: var(--border-hover); }
    .admin-card-thumb {
      width: 100%; aspect-ratio: 16/10; background: var(--bg-elevated);
      overflow: hidden; position: relative;
    }
    .admin-card-thumb img, .admin-card-thumb video {
      width: 100%; height: 100%; object-fit: cover;
    }
    .admin-card-body { padding: 16px 18px; }
    .admin-card-cat {
      font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
    }
    .admin-card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .admin-card-date { font-size: 12px; color: var(--text-muted); }
    .admin-card-actions {
      display: flex; gap: 8px; margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .btn-delete {
      padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(239,68,68,0.2);
      background: rgba(239,68,68,0.08); color: #f87171;
      font-size: 12px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: var(--transition);
    }
    .btn-delete:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state p { font-size: 14px; }

    /* Toast */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 20px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: toastIn 0.4s cubic-bezier(0.16,1,0.3,1);
      max-width: 360px;
    }
    .toast.success { border-left: 3px solid #22c55e; }
    .toast.error { border-left: 3px solid #ef4444; }
    .toast.info { border-left: 3px solid var(--accent); }
    @keyframes toastIn { from { opacity:0; transform:translateX(40px) } to { opacity:1; transform:translateX(0) } }
    @keyframes toastOut { from { opacity:1; transform:translateX(0) } to { opacity:0; transform:translateX(40px) } }

    /* Loading */
    .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
    .loading::after {
      content: ''; display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-left: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      main { padding: 80px 20px 40px; }
      .upload-section { padding: 24px; }
      .form-row { grid-template-columns: 1fr; }
      .login-card { padding: 36px 24px; margin: 0 16px; }
      .admin-works-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="noise-overlay"></div>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>作品管理</h2>
    <p class="login-sub">李琪 LIQI · 后台管理系统</p>
    <input type="password" id="adminPwd" placeholder="输入管理密码" onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="login-btn" onclick="checkPassword()">进入管理</button>
  </div>
</div>

<!-- Nav -->
<nav id="navbar">
  <div class="nav-logo">
    LI<span>QI</span> · 管理后台
  </div>
  <ul class="nav-links">
    <li><a href="index.html">返回主站</a></li>
  </ul>
</nav>

<!-- Main Content -->
<main id="adminMain" style="display:none">
  <h1 class="page-title">作品 <span class="accent">管理</span></h1>
  <p class="page-subtitle">上传新作品到云存储，所有访客可见</p>

  <!-- Upload Form -->
  <div class="upload-section">
    <h3>上传新作品</h3>
    <div class="form-row">
      <div class="form-group">
        <label>作品标题</label>
        <input class="form-input" type="text" id="workTitle" placeholder="例：品牌宣传海报">
      </div>
      <div class="form-group">
        <label>分类</label>
        <select class="form-input" id="workCat">
          <option value="brand">品牌视觉</option>
          <option value="ui">UI 设计</option>
          <option value="photo">摄影</option>
          <option value="video">视频制作</option>
          <option value="space">展陈空间</option>
        </select>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label>描述</label>
      <textarea class="form-input" id="workDesc" placeholder="作品简短描述..." rows="2"></textarea>
    </div>
    <label class="form-check">
      <input type="checkbox" id="workWide">
      宽卡片（横跨两列显示）
    </label>

    <div class="upload-area" id="uploadArea">
      <div class="upload-area-icon">📤</div>
      <h4>拖拽文件到此处</h4>
      <p>或点击选择文件 · 支持 JPG、PNG、GIF、MP4、WebM</p>
      <input type="file" id="fileInput" multiple accept="image/*,video/*">
    </div>
    <div class="upload-progress" id="uploadProgress">
      <div class="upload-progress-bar" id="uploadProgressBar"></div>
    </div>
  </div>

  <!-- Works List -->
  <div class="works-section">
    <h3>已上传作品 <span class="count" id="worksCount"></span></h3>
    <div id="adminGrid">
      <div class="loading">加载中</div>
    </div>
  </div>
</main>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
<script>
/* ═══════════════════════════════════════════════
   CONFIG
═════════════════════════════════════════════════ */
const ENV_ID = 'cloudbase-1gugchvz1e7c6bfc';
const ADMIN_PWD = 'liqi2026';
const STORAGE_PREFIX = 'portfolio/';
const CAT_MAP = {
  brand: '品牌视觉', ui: 'UI 设计', photo: '摄影',
  video: '视频制作', space: '展陈空间'
};

let cbApp = null;
let cbDb = null;
let allWorks = [];

/* ═══════════════════════════════════════════════
   PASSWORD GATE
═════════════════════════════════════════════════ */
function checkPassword() {
  const pwd = document.getElementById('adminPwd').value;
  if (pwd === ADMIN_PWD) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('adminMain').style.display = '';
    initAdmin();
  } else {
    showToast('密码错误，请重试', 'error');
  }
}

/* ═══════════════════════════════════════════════
   CLOUDBASE INIT
═════════════════════════════════════════════════ */
async function initAdmin() {
  try {
    cbApp = cloudbase.init({ env: ENV_ID });
    const auth = cbApp.auth({ persistence: 'local' });
    const loginState = await auth.getLoginState();
    if (!loginState) {
      await auth.anonymousAuthProvider().signIn();
    }
    cbDb = cbApp.database();
    await loadWorks();
  } catch (err) {
    console.error('CloudBase init failed:', err);
    showToast('CloudBase 初始化失败: ' + err.message, 'error');
  }
}

/* ═══════════════════════════════════════════════
   UPLOAD
═════════════════════════════════════════════════ */
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

async function handleFiles(fileList) {
  if (!cbDb) { showToast('请先登录', 'error'); return; }

  const files = Array.from(fileList);
  fileInput.value = '';

  for (const file of files) {
    if (!file.type.startsWith('image/') && !file.type.startsWith('video/')) {
      showToast(`不支持的文件: ${file.name}`, 'error');
      continue;
    }

    const title = document.getElementById('workTitle').value.trim() || file.name.replace(/\.[^/.]+$/, '');
    const cat = document.getElementById('workCat').value;
    const desc = document.getElementById('workDesc').value.trim() || `上传于 ${new Date().toLocaleDateString()}`;
    const wide = document.getElementById('workWide').checked;
    const ext = file.name.split('.').pop();
    const cloudPath = `${STORAGE_PREFIX}${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;

    try {
      showProgress(true);
      showToast(`正在上传: ${file.name}`, 'info');

      const uploadResult = await cbApp.uploadFile({
        cloudPath: cloudPath,
        filePath: file,
        onUploadProgress: ({ loaded, total }) => {
          const pct = Math.round((loaded * 100) / total);
          updateProgress(pct);
        }
      });

      const urlResult = await cbApp.getTempFileURL({
        fileList: [{ fileID: uploadResult.fileID, maxAge: 86400 }]
      });
      const src = urlResult.fileList?.[0]?.tempFileURL || urlResult.fileList?.[0]?.download_url || '';

      await cbDb.collection('works').add({
        title, desc, cat, catLabel: CAT_MAP[cat] || cat,
        type: file.type.startsWith('video/') ? 'video' : 'image',
        fileID: uploadResult.fileID,
        src: src,
        wide: wide,
        meta: [ext.toUpperCase(), '管理上传'],
        order: Date.now(),
        createdAt: cbDb.serverDate()
      });

      showToast(`上传成功: ${file.name}`, 'success');
    } catch (err) {
      console.error('Upload error:', err);
      showToast(`上传失败: ${file.name} - ${err.message}`, 'error');
    }
  }

  showProgress(false);
  await loadWorks();
}

function showProgress(show) {
  document.getElementById('uploadProgress').classList.toggle('active', show);
  if (!show) updateProgress(0);
}
function updateProgress(pct) {
  document.getElementById('uploadProgressBar').style.width = pct + '%';
}

/* ═══════════════════════════════════════════════
   LOAD WORKS
═════════════════════════════════════════════════ */
async function loadWorks() {
  if (!cbDb) return;
  try {
    const result = await cbDb.collection('works').orderBy('order', 'desc').limit(100).get();
    allWorks = result.data || [];
    // Convert fileID to public CDN URL (storage is public-read)
    allWorks.forEach(w => {
      if (w.fileID && /^cloud:\/\/[^/]+\./.test(w.fileID)) {
        const m = w.fileID.match(/^cloud:\/\/[^.]+\.([^/]+)\/(.+)$/);
        if (m) w.src = `https://${m[1]}.tcb.qcloud.la/${m[2]}`;
      }
    });
    renderAdminWorks();
  } catch (err) {
    console.error('Load works failed:', err);
    showToast('加载作品列表失败: ' + err.message, 'error');
  }
}

/* ═══════════════════════════════════════════════
   DELETE
═════════════════════════════════════════════════ */
async function deleteWork(docId, fileID) {
  if (!confirm('确定要删除这个作品吗？')) return;
  try {
    // 1. 先删数据库记录，确保前台状态一致（即使云存储删失败也不影响）
    await cbDb.collection('works').doc(docId).remove();

    // 2. 再尝试删云存储文件，失败只打警告不阻断
    if (fileID) {
      try {
        await cbApp.deleteFile({ fileList: [fileID] });
      } catch (fileErr) {
        console.warn('Cloud storage file deletion failed (already cleaned from DB):', fileErr);
      }
    }

    showToast('作品已删除', 'info');
    await loadWorks();
  } catch (err) {
    console.error('Delete failed:', err);
    showToast('删除失败: ' + err.message, 'error');
  }
}

/* ═══════════════════════════════════════════════
   RENDER
═════════════════════════════════════════════════ */
function renderAdminWorks() {
  const grid = document.getElementById('adminGrid');
  document.getElementById('worksCount').textContent = `共 ${allWorks.length} 件`;

  if (allWorks.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>暂无上传作品，使用上方表单添加</p></div>';
    return;
  }

  grid.innerHTML = '<div class="admin-works-grid">' + allWorks.map(w => {
    const isVideo = w.type === 'video';
    const thumb = isVideo
      ? `<video src="${w.src || ''}#t=0.001" muted preload="metadata"></video>`
      : `<img src="${w.src || ''}" alt="${w.title}" loading="lazy">`;
    const dateStr = w.createdAt ? new Date(w.createdAt).toLocaleDateString() : '';
    return `
      <div class="admin-card">
        <div class="admin-card-thumb">${thumb}</div>
        <div class="admin-card-body">
          <div class="admin-card-cat">${w.catLabel || ''}</div>
          <div class="admin-card-title">${w.title}</div>
          <div class="admin-card-date">${dateStr}</div>
          <div class="admin-card-actions">
            <button class="btn-delete" onclick="deleteWork('${w._id}','${w.fileID || ''}')">删除作品</button>
          </div>
        </div>
      </div>
    `;
  }).join('') + '</div>';
  grid.querySelectorAll('video').forEach(v => {
    v.addEventListener('loadeddata', () => { v.currentTime = 0.001; });
  });
}

/* ═══════════════════════════════════════════════
   TOAST
═════════════════════════════════════════════════ */
function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'toastOut 0.4s cubic-bezier(0.16,1,0.3,1) forwards';
    setTimeout(() => toast.remove(), 400);
  }, 3000);
}
</script>
